name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Build Docker Image and Run Containers
      run: docker compose up -d --build

    - name: Wait for Application Startup
      run: |
        echo "Waiting for Spring Boot and MongoDB to start..."
        sleep 20

    - name: Verify Running Containers
      run: docker ps

    - name: Test API Endpoint
      run: curl -f http://localhost:8085/api/test

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and Push Backend Image to GHCR
      run: |
        docker build -t ghcr.io/priyangshu0011/blood-app:latest .
        docker push ghcr.io/priyangshu0011/blood-app:latest
